<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>The 6th Asia Pacific Vascular Summit — Booklet</title>
<meta name="description" content="Official meeting booklet — The 6th Asia Pacific Vascular Summit, 3-4 July 2026, Bintan, Indonesia">

<style>
  :root{
    --ink:#13324a;
    --sky:#5fa8c9;
    --mist:#eaf3f8;
    --paper:#ffffff;
    --shadow: 0 30px 60px -20px rgba(19,50,74,0.35);
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    height:100%;
    background:
      radial-gradient(ellipse 1200px 700px at 50% -10%, rgba(95,168,201,0.18), transparent 60%),
      linear-gradient(180deg, #f6fafc 0%, #eaf3f8 45%, #dceaf1 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    overflow-x:hidden;
  }

  .top-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 18px 28px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:700;
    letter-spacing:0.02em;
  }

  .brand .dot{
    width:9px;height:9px;border-radius:50%;
    background: linear-gradient(135deg, var(--sky), var(--ink));
    flex-shrink:0;
  }

  .brand-title{
    font-size: 14px;
    line-height:1.2;
  }
  .brand-title small{
    display:block;
    font-weight:400;
    color:#5b7c8f;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
  }

  .controls{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .ctrl-btn{
    background: var(--paper);
    border: 1px solid #d3e3ea;
    color: var(--ink);
    width:38px;height:38px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow: 0 2px 6px rgba(19,50,74,0.06);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    font-size:16px;
    user-select:none;
  }
  .ctrl-btn:hover{ transform: translateY(-1px); box-shadow: 0 6px 14px rgba(19,50,74,0.12); }
  .ctrl-btn:active{ transform: translateY(0px) scale(0.96); }

  .page-indicator{
    font-size:13px;
    color:#5b7c8f;
    min-width:64px;
    text-align:center;
    font-variant-numeric: tabular-nums;
  }

  .stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 10px 16px 40px;
    min-height: calc(100vh - 78px);
  }

  #flipbook{
    margin: 0 auto;
    box-shadow: var(--shadow);
  }

  #flipbook .page{
    background-color: var(--paper);
    background-size: cover;
    background-position: center;
  }

  /* turn.js shadow refinement */
  .shadow{
    box-shadow: 0px 0px 30px 0px rgba(0,0,0,0.25) !important;
  }

  .hint{
    margin-top: 22px;
    font-size: 12.5px;
    color: #5b7c8f;
    text-align:center;
    max-width: 420px;
    line-height:1.5;
  }
  .hint b{ color: var(--ink); }

  .loading-wrap{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:14px;
    background: linear-gradient(180deg, #f6fafc, #eaf3f8);
    z-index: 50;
    transition: opacity 0.4s ease;
  }
  .loading-wrap.hide{ opacity:0; pointer-events:none; }

  .spinner{
    width:34px;height:34px;
    border-radius:50%;
    border: 3px solid #d3e3ea;
    border-top-color: var(--sky);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .loading-text{
    font-size:13px;
    color:#5b7c8f;
  }

  @media (max-width: 640px){
    .top-bar{ padding: 14px 16px; }
    .brand-title{ font-size:12.5px; }
    .hint{ display:none; }
  }
</style>
</head>
<body>

  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Opening the booklet…</div>
  </div>

  <div class="top-bar">
    <div class="brand">
      <span class="dot"></span>
      <div class="brand-title">
        The 6th Asia Pacific Vascular Summit
        <small>Meeting Booklet · Bintan, Indonesia</small>
      </div>
    </div>
    <div class="controls">
      <div class="ctrl-btn" id="prevBtn" title="Previous page" aria-label="Previous page">&#8249;</div>
      <div class="page-indicator" id="pageIndicator">1 / 14</div>
      <div class="ctrl-btn" id="nextBtn" title="Next page" aria-label="Next page">&#8250;</div>
    </div>
  </div>

  <div class="stage">
    <div id="flipbook">
      <div class="page" style="background-image:url('pages/page-01.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-02.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-03.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-04.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-05.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-06.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-07.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-08.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-09.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-10.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-11.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-12.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-13.jpg')"></div>
      <div class="page" style="background-image:url('pages/page-14.jpg')"></div>
    </div>
    <div class="hint"><b>Tip:</b> drag a page corner to flip, or use the arrow buttons above. On mobile, swipe.</div>
  </div>

<script src="js/jquery.min.js"></script>
<script src="js/turn.js"></script>
<script>
  $(function(){

    var TOTAL_PAGES = 14;

    function computeSize(){
      var margin = 90; // room for top bar + padding
      var maxW = Math.min(window.innerWidth - 40, 1000);
      var maxH = window.innerHeight - margin;

      // single-page aspect ratio from source images
      var pageRatio = 1100/1555;

      var isMobile = window.innerWidth < 640;
      var bookWidth, bookHeight;

      if (isMobile){
        // single page view on mobile
        bookHeight = Math.min(maxH, maxW / pageRatio);
        bookWidth = bookHeight * pageRatio;
      } else {
        // double page view on desktop
        var doublePageRatio = pageRatio * 2;
        bookHeight = Math.min(maxH, maxW / doublePageRatio);
        bookWidth = bookHeight * doublePageRatio;
        if (bookWidth > maxW){
          bookWidth = maxW;
          bookHeight = bookWidth / doublePageRatio;
        }
      }
      return { width: Math.floor(bookWidth), height: Math.floor(bookHeight), isMobile: isMobile };
    }

    var size = computeSize();

    $('#flipbook').turn({
      width: size.width,
      height: size.height,
      autoCenter: true,
      display: size.isMobile ? 'single' : 'double',
      acceleration: true,
      gradients: true,
      elevation: 50,
      when: {
        turning: function(event, page){
          updateIndicator(page);
        },
        turned: function(event, page){
          updateIndicator(page);
        }
      }
    });

    function updateIndicator(page){
      $('#pageIndicator').text(page + ' / ' + TOTAL_PAGES);
    }

    // hide loader once first page image is ready (or after a short delay as fallback)
    var firstImg = new Image();
    firstImg.onload = hideLoader;
    firstImg.onerror = hideLoader;
    firstImg.src = 'pages/page-01.jpg';
    setTimeout(hideLoader, 3000);
    setTimeout(function(){
      if (!loaderHidden) $('#loadingText').text('Still loading — almost there…');
    }, 1500);

    var loaderHidden = false;
    function hideLoader(){
      if (loaderHidden) return;
      loaderHidden = true;
      $('#loadingWrap').addClass('hide');
      setTimeout(function(){ $('#loadingWrap').remove(); }, 500);
    }

    $('#nextBtn').on('click', function(){ $('#flipbook').turn('next'); });
    $('#prevBtn').on('click', function(){ $('#flipbook').turn('previous'); });

    $(document).on('keydown', function(e){
      if (e.key === 'ArrowRight') $('#flipbook').turn('next');
      if (e.key === 'ArrowLeft') $('#flipbook').turn('previous');
    });

    var resizeTimer;
    $(window).on('resize', function(){
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function(){
        var newSize = computeSize();
        $('#flipbook').turn('size', newSize.width, newSize.height);
        $('#flipbook').turn('display', newSize.isMobile ? 'single' : 'double');
      }, 250);
    });

  });
</script>

</body>
</html>
